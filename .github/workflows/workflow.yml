name: Build, Test, and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Install Python and MSVC via Chocolatey
        run: |
          choco install python -y
          choco install visualstudio2026buildtools --includeOptional -y

      - name: Setup Git Bash
        run: |
          echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "c-cpp, javascript-typescript"
          queries: security-and-quality

      - name: Build with local.sh
        shell: sh
        run: sh ./local.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: partial

      - name: Run unit tests
        shell: sh
        run: npm run test

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Setup Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
            max-parallelism = 2

      - name: Build with build.sh
        shell: sh
        run: sh ./build.sh -sl -sdb

      - name: Upload prebuilds (x64)
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: prebuilds/linux-x64
          retention-days: 1

      - name: Upload prebuilds (arm64)
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: prebuilds/linux-arm64
          retention-days: 1

      - name: Upload prebuilds (s390x)
        uses: actions/upload-artifact@v7
        with:
          name: linux-s390x
          path: prebuilds/linux-s390x
          retention-days: 1

      - name: Upload prebuild (ppc64)
        uses: actions/upload-artifact@v7
        with:
          name: linux-ppc64
          path: prebuilds/linux-ppc64
          retention-days: 1

  build-darwin:
    strategy:
      matrix:
        os: [macos-26-intel, macos-26]
        architecture: [x64, arm64]
        exclude:
          - os: macos-26-intel
            architecture: arm64
          - os: macos-26
            architecture: x64
    runs-on: ${{ matrix.os }}
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          architecture: ${{ matrix.architecture }}
          cache: 'npm'

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install LLVM and OpenMP via Homebrew
        run: |
          brew install llvm
          brew install libomp

      - name: Install Python via Homebrew
        run: brew install python

      - name: Build with local.sh
        shell: sh
        run: sh ./local.sh

      - name: Upload prebuild
        uses: actions/upload-artifact@v7
        with:
          name: darwin-${{ matrix.architecture }}
          path: prebuilds/darwin-${{ matrix.architecture }}/
          retention-days: 1

