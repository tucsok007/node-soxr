  bulid-windows-and-publish:
    runs-on: windows-latest
    needs: [build-linux, build-darwin]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Install Python and MSVC via Chocolatey
        run: |
          choco install python -y
          choco install visualstudio2026buildtools --includeOptional -y

      - name: Setup Git Bash
        run: |
          echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with local.sh
        shell: sh
        run: export HOME=$(pwd) && sh ./local.sh

      - name: Download linux (x64) prebuilds
        uses: actions/download-artifact@v8
        with:
          name: linux-x64
          path: ./prebuilds/linux-x64

      - name: Download linux (arm64) prebuilds
        uses: actions/download-artifact@v8
        with:
          name: linux-arm64
          path: ./prebuilds/linux-arm64

      - name: Download linux (s390x) prebuilds
        uses: actions/download-artifact@v8
        with:
          name: linux-s390x
          path: ./prebuilds/linux-s390x

      - name: Download linux (ppc64) prebuild
        uses: actions/download-artifact@v8
        with:
          name: linux-ppc64
          path: ./prebuilds/linux-ppc64

      - name: Download darwin (x64) prebuild
        uses: actions/download-artifact@v8
        with:
          name: darwin-x64
          path: ./prebuilds/darwin-x64

      - name: Download darwin (arm64) prebuild
        uses: actions/download-artifact@v8
        with:
          name: darwin-arm64
          path: ./prebuilds/darwin-arm64

      - name: Extract version from package.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create Git tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ env.PACKAGE_VERSION }}" -m "Release v${{ env.PACKAGE_VERSION }}"
          git push origin "v${{ env.PACKAGE_VERSION }}"

      - name: Publish to npm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: npm publish

      - name: Dry publish
        run: npm publish --dry-run
